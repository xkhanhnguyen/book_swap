{% extends "base_generic.html" %}
{% block title %}Write a Review — BookSwap{% endblock %}

{% block content %}
<div class="book-detail" style="max-width:520px">
  <div style="margin-bottom:24px">
    <a href="{{ book.get_absolute_url }}" class="text-muted" style="font-size:14px">← Back to Book</a>
  </div>

  <h1 style="font-size:22px; margin-bottom:4px">Write a Review</h1>
  <p style="font-size:14px; color:var(--text-muted); margin-bottom:32px">{{ book.title }}</p>

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label style="margin-bottom:12px; display:block">Your Rating</label>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        {% for i in "12345" %}
        <label style="display:flex; flex-direction:column; align-items:center; cursor:pointer; gap:4px; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius); font-size:13px; color:var(--text-secondary)">
          <input type="radio" name="rating" value="{{ i }}" required style="display:none">
          <span style="font-size:22px">&#9733;</span>
          <span>{{ i }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="form-group">
      <label>Review</label>
      <textarea name="review_text" class="form-control" rows="5" placeholder="Share your thoughts about this book..."></textarea>
    </div>

    <div style="display:flex; gap:10px; margin-top:24px">
      <button type="submit" class="btn btn-primary">Submit Review</button>
      <a href="{{ book.get_absolute_url }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
