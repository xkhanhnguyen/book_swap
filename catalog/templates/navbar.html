{% load static %}
<nav class="navbar">
  <div class="navbar-inner">
    <a href="{% url 'index' %}" class="navbar-brand">BookSwap</a>

    <div class="navbar-links">
      <a href="{% url 'books' %}">Books</a>
      <a href="{% url 'authors' %}">Authors</a>
    </div>

    <div class="navbar-right">
      <form method="get" class="search-form" action="{% url 'search-results' %}">
        <input type="search" name="search_query" placeholder="Search books…" />
        <button type="submit"><i class="fa fa-search" style="font-size:13px"></i></button>
      </form>

      {% if user.is_authenticated %}
      <a href="{% url 'my-swaps' %}" style="font-size:13px; color:var(--accent); padding:6px 10px; border:1px solid rgba(200,169,110,0.3); border-radius:var(--radius)">
        {{ user.profile.credit_balance }} cr
      </a>
      {% if unread_notifications_count %}
      <a href="{% url 'notifications' %}" style="position:relative; font-size:13px; padding:6px 10px; color:var(--text-secondary)">
        <i class="fa fa-bell"></i>
        <span style="position:absolute; top:2px; right:2px; background:#e05c5c; color:#fff; border-radius:50%; width:16px; height:16px; font-size:10px; display:flex; align-items:center; justify-content:center; line-height:1">{{ unread_notifications_count }}</span>
      </a>
      {% endif %}
      <div class="dropdown">
        <button class="dropdown-toggle" onclick="var d=this.closest('.dropdown');d.classList.toggle('open');event.stopPropagation()">{{ user.get_username }} <i class="fa fa-chevron-down" style="font-size:10px"></i></button>
        <div class="dropdown-menu">
          <a href="{% url 'my-swaps' %}">My Swaps</a>
          <a href="{% url 'my-swapped-book' %}">My Books</a>
          <a href="{% url 'account-settings' %}">Settings</a>
          <div class="dropdown-divider"></div>
          <form method="post" action="{% url 'logout' %}" style="margin:0">
            {% csrf_token %}
            <button type="submit" style="background:none;border:none;width:100%;text-align:left;padding:10px 16px;font-size:14px;color:var(--text-secondary);cursor:pointer;font-family:inherit">Sign out</button>
          </form>
        </div>
      </div>
      {% else %}
      <a href="{% url 'login' %}?next={{ request.path }}" class="btn btn-secondary btn-sm">Sign in</a>
      <a href="{% url 'users-register' %}" class="btn btn-primary btn-sm">Sign up</a>
      {% endif %}
    </div>
  </div>
</nav>
