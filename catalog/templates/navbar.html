{% load static %}
<nav class="navbar">
  <div class="navbar-inner">
    <a href="{% url 'index' %}" class="navbar-brand">BookSwap</a>

    <div class="navbar-links">
      <a href="{% url 'books' %}">Books</a>
      <a href="{% url 'authors' %}">Authors</a>
    </div>

    <div class="navbar-right">
      <form method="get" class="search-form" action="{% url 'search-results' %}">
        <input type="search" name="search_query" placeholder="Search books…" />
        <button type="submit"><i class="fa fa-search" style="font-size:13px"></i></button>
      </form>

      {% if user.is_authenticated %}
      <a href="{% url 'my-swaps' %}" style="font-size:13px; color:var(--accent); padding:6px 10px; border:1px solid rgba(200,169,110,0.3); border-radius:var(--radius)">
        {{ user.profile.points }} pts
      </a>
      <div class="dropdown">
        <button class="dropdown-toggle" onclick="var d=this.closest('.dropdown');d.classList.toggle('open');event.stopPropagation()">{{ user.get_username }} <i class="fa fa-chevron-down" style="font-size:10px"></i></button>
        <div class="dropdown-menu">
          <a href="{% url 'my-swaps' %}">My Swaps</a>
          <a href="{% url 'my-swapped-book' %}">My Books</a>
          <a href="{% url 'account-settings' %}">Settings</a>
          <div class="dropdown-divider"></div>
          <a href="{% url 'logout' %}">Sign out</a>
        </div>
      </div>
      {% else %}
      <a href="{% url 'login' %}?next={{ request.path }}" class="btn btn-secondary btn-sm">Sign in</a>
      <a href="{% url 'users-register' %}" class="btn btn-primary btn-sm">Sign up</a>
      {% endif %}
    </div>
  </div>
</nav>
